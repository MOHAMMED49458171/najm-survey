<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استبيانات نجم — لا يسوقونها عليك</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Kufi Arabic',sans-serif;background:#003921;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
.dl{position:absolute;inset:0;opacity:.3;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><line x1='8' y1='38' x2='28' y2='18' stroke='%2300df8e' stroke-width='4' stroke-linecap='round'/></svg>");}
.card{position:relative;text-align:center;max-width:520px;width:100%;}
h1{font-size:32px;font-weight:700;margin-bottom:10px;}
.sub{color:#00DF8E;font-size:17px;margin-bottom:34px;}
a.btn{display:block;background:#00DF8E;color:#003921;text-decoration:none;font-weight:700;font-size:20px;padding:20px;border-radius:16px;margin-bottom:16px;transition:.15s;}
a.btn:hover{background:#00c97f;}
a.btn span{display:block;font-size:13px;font-weight:500;color:#00693f;margin-top:4px;}
.foot{margin-top:24px;color:#8fb3a3;font-size:12px;}
</style>
</head>
<body>
<div class="dl"></div>
<div class="card">
  <h1>لا يسوقونها عليك</h1>
  <div class="sub">التوعية المرورية لطلاب المدارس — نجم × وزارة التعليم</div>
  <a class="btn" href="before.html">استبيان «قبل العرض»<span>قبل ما تبدأ الجلسة</span></a>
  <a class="btn" href="after.html">استبيان «بعد العرض»<span>بعد نهاية الجلسة</span></a>
  <div class="foot">مبادرة نجم للتوعية المرورية</div>
</div>
</body>
</html>
