<!DOCTYPE html>
<html lang="ar" dir="rtl">

<title>استبيان بعد العرض — نجم</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;700&display=swap');
:root{ --green:#003921; --accent:#00DF8E; --accent2:#00A968; --ink:#12261d; --muted:#5c6f66; --bg:#f3f7f4; }
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{ font-family:'Noto Kufi Arabic',sans-serif; background:var(--bg); color:var(--ink); line-height:1.7; }
.dash{ background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='70' height='70'><line x1='8' y1='40' x2='30' y2='18' stroke='%2300df8e' stroke-width='4' stroke-linecap='round' opacity='0.5'/></svg>"); }
.wrap{ max-width:760px; margin:0 auto; padding:0 16px 60px; }
header{ background:var(--green); color:#fff; padding:34px 20px 42px; position:relative; overflow:hidden; }
header .dashlayer{ position:absolute; inset:0; opacity:.35;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><line x1='8' y1='38' x2='28' y2='18' stroke='%2300df8e' stroke-width='4' stroke-linecap='round'/></svg>"); }
header .inner{ position:relative; max-width:760px; margin:0 auto; }
header img.logo{ height:56px; margin-bottom:18px; }
header h1{ font-size:30px; font-weight:700; }
header .sub{ color:var(--accent); font-weight:500; margin-top:6px; font-size:17px; }
.introcard{ background:#fff; border-radius:18px; padding:20px 22px; margin:-22px auto 22px; max-width:760px; box-shadow:0 10px 30px rgba(0,57,33,.10); position:relative; z-index:2; border-right:6px solid var(--accent); }
.introcard p{ color:var(--muted); }
.ident{ margin:0 auto 20px; }
.ident label{ font-weight:500; display:block; margin-bottom:8px; color:var(--green); }
.ident input{ width:100%; padding:14px 16px; border:2px solid #e0e8e3; border-radius:12px; font-family:inherit; font-size:15px; }
.ident input:focus{ outline:none; border-color:var(--accent2); }
.q{ background:#fff; border-radius:18px; padding:22px 22px 10px; margin-bottom:18px; box-shadow:0 4px 18px rgba(0,57,33,.06); }
.qnum{ display:inline-block; background:var(--green); color:#fff; width:30px; height:30px; border-radius:50%; text-align:center; line-height:30px; font-weight:700; font-size:15px; margin-left:10px; }
.qtext{ font-weight:700; font-size:18px; color:var(--ink); display:inline; }
.hint{ color:var(--accent2); font-size:13px; margin:8px 0 2px; font-style:italic; }
.opts{ margin-top:16px; }
.opt{ display:flex; align-items:center; gap:12px; padding:14px 16px; border:2px solid #e8efea; border-radius:14px; margin-bottom:10px; cursor:pointer; transition:.15s; font-size:15px; }
.opt:hover{ border-color:var(--accent); background:#f4fdf8; }
.opt input{ accent-color:var(--green); width:20px; height:20px; flex:0 0 auto; }
.opt.sel{ border-color:var(--green); background:#eefaf3; }
.opt.correct{ border-color:var(--accent2); background:#e8fbf1; }
.opt.wrong{ border-color:#e2857f; background:#fdeeed; }
.scale{ display:flex; justify-content:space-between; gap:8px; margin-top:16px; }
.scale button{ flex:1; padding:16px 0; border:2px solid #e8efea; background:#fff; border-radius:14px; font-family:inherit; font-size:20px; font-weight:700; cursor:pointer; color:var(--green); transition:.15s; }
.scale button:hover{ border-color:var(--accent); }
.scale button.sel{ background:var(--green); color:#fff; border-color:var(--green); }
.scale.scale-wide{ gap:5px; }
.scale.scale-wide button{ padding:12px 0; font-size:15px; }
@media(max-width:520px){ .scale.scale-wide{ flex-wrap:wrap; } .scale.scale-wide button{ flex:0 0 calc(20% - 4px); } }
.scalelbl{ display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-top:8px; padding:0 4px; }
textarea{ width:100%; margin-top:14px; padding:14px 16px; border:2px solid #e8efea; border-radius:12px; font-family:inherit; font-size:15px; resize:vertical; min-height:90px; }
textarea:focus{ outline:none; border-color:var(--accent2); }
.submit{ width:100%; padding:18px; background:var(--accent); color:var(--green); border:none; border-radius:16px; font-family:inherit; font-size:19px; font-weight:700; cursor:pointer; margin-top:8px; transition:.15s; }
.submit:hover{ background:#00c97f; }
.err{ color:#c0392b; text-align:center; margin-top:14px; font-size:14px; min-height:18px; }
.footer{ text-align:center; margin-top:26px; display:none; }
.footer a{ color:var(--muted); font-size:12px; text-decoration:none; opacity:.7; }
/* result */
.result{ display:none; text-align:center; background:#fff; border-radius:22px; padding:44px 26px; margin-top:26px; box-shadow:0 10px 30px rgba(0,57,33,.10); }
.result h2{ color:var(--green); font-size:28px; margin-bottom:12px; }
.result p{ color:var(--muted); font-size:16px; max-width:520px; margin:0 auto; }
.scorebadge{ display:inline-block; background:var(--green); color:#fff; padding:14px 26px; border-radius:16px; font-size:20px; font-weight:700; margin:18px 0; }
.scorebadge b{ color:var(--accent); }
</style>
</head>

<div class="wrap">
  <div class="introcard"><p>بعد ما شفت العرض — جاوب على الأسئلة، وشوف الفرق بنفسك.</p></div>
  <form id="f" onsubmit="return false;">
    <div class="q ident">
      <label for="ident">اسمك أو رقمك (اختياري — يساعدنا نقارن قبل/بعد)</label>
      <input id="ident" type="text" placeholder="مثال: فيصل - ثالث ثانوي / أو رقم الطالب">
    </div>
    
    <button class="submit" id="btn">إرسال إجاباتي</button>
    <div class="err" id="err"></div>
  </form>

    <h2 id="rtitle"></h2>
    <div id="scorewrap"></div>
    <p id="rbody"></p>
  </div>
  <div class="footer"><a href="#" id="exp">للمشرف: تصدير الردود (CSV)</a></div>
</div>
<script>
const QUESTIONS = [{"type": "scale", "q": "هل ترشّح إقامة هذا العرض في مدارس أخرى؟", "min": "لا أرشّح", "max": "أرشّح بشدة", "steps": 10}, {"type": "scale", "q": "كيف تقيّم معرفتك الحين بالأنظمة والسلوكيات المرورية؟", "min": "ضعيفة جداً", "max": "ممتازة"}, {"type": "tf", "q": "أعلى مسبب للحوادث في المملكة هو عدم ترك مسافة كافية (أكثر من 697 ألف حادث).", "correct": 0}, {"type": "tf", "q": "المسافة الآمنة بين المركبات تُحسب بقاعدة الـ3 ثواني.", "correct": 0}, {"type": "mcq", "q": "أسرع وأسهل طريقة للتبليغ عن حادث:", "options": ["أنتظر دورية تمر بالشارع بالصدفة.", "عن طريق تطبيق نجم أو الرقم الموحد 199033.", "أصوّر الحادث وأرسله للأصدقاء."], "correct": 1}, {"type": "scale", "q": "بعد العرض، صرت أكثر وعياً بخطورة السرعة وعدم ترك المسافة والانشغال بالجوال.", "min": "لا أوافق", "max": "أوافق تماماً"}, {"type": "text", "q": "عندك سؤال أو اقتراح أو معلومة تفيدنا؟ (اختياري)", "optional": true}];
const REVEAL = true;
const STOREKEY = "najm_survey_after";
// ==== إعدادات التجميع المركزي ====
// الصق رابط تطبيق الويب (Google Apps Script Web App) بين علامتي الاقتباس:
const ENDPOINT = "https://script.google.com/macros/s/AKfycbyGYe63cdTuMATqCyisBoOJ_1TSJl5WU1nqMO-DlKDxy7UR8qa_m-dDOQ44OPYqjSjyrw/exec";
const SURVEY_ID = "after";

const answers = {};

function render(){
  const form = document.getElementById('f');
  const anchor = document.getElementById('btn');
  QUESTIONS.forEach((q,i)=>{
    const card = document.createElement('div'); card.className='q'; card.dataset.i=i;
    let html = '<span class="qnum">'+(i+1)+'</span><span class="qtext">'+q.q+'</span>';
    if(q.hint) html += '<div class="hint">'+q.hint+'</div>';
    if(q.type==='mcq'){
      html += '<div class="opts">'+q.options.map((o,j)=>
        '<label class="opt" data-j="'+j+'"><input type="radio" name="q'+i+'" value="'+j+'"><span>'+o+'</span></label>').join('')+'</div>';
    } else if(q.type==='tf'){
      html += '<div class="opts">'+['صح','خطأ'].map((o,j)=>
        '<label class="opt" data-j="'+j+'"><input type="radio" name="q'+i+'" value="'+j+'"><span>'+o+'</span></label>').join('')+'</div>';
    } else if(q.type==='scale'){
      var _steps = q.steps || 5;
      var _arr = []; for(var _s=1;_s<=_steps;_s++) _arr.push(_s);
      html += '<div class="scale'+(_steps>5?' scale-wide':'')+'">'+_arr.map(n=>'<button type="button" data-v="'+n+'">'+n+'</button>').join('')+'</div>';
      html += '<div class="scalelbl"><span>'+q.min+'</span><span>'+q.max+'</span></div>';
    } else if(q.type==='text'){
      html += '<textarea name="q'+i+'" placeholder="اكتب هنا... (اختياري)"></textarea>';
    }
    card.innerHTML = html;
    form.insertBefore(card, anchor);
    // handlers
    if(q.type==='mcq'||q.type==='tf'){
      card.querySelectorAll('.opt').forEach(opt=>{
        opt.addEventListener('click',()=>{
          card.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
          opt.classList.add('sel'); opt.querySelector('input').checked=true;
          answers[i]=parseInt(opt.dataset.j);
        });
      });
    } else if(q.type==='scale'){
      card.querySelectorAll('.scale button').forEach(b=>{
        b.addEventListener('click',()=>{
          card.querySelectorAll('.scale button').forEach(x=>x.classList.remove('sel'));
          b.classList.add('sel'); answers[i]=parseInt(b.dataset.v);
        });
      });
    } else if(q.type==='text'){
      card.querySelector('textarea').addEventListener('input',e=>{ answers[i]=e.target.value; });
    }
  });
}
render();

document.getElementById('btn').addEventListener('click',()=>{
  const err=document.getElementById('err'); err.textContent='';
  for(let i=0;i<QUESTIONS.length;i++){
    const q=QUESTIONS[i];
    if(q.optional) continue;
    if(answers[i]===undefined||answers[i]===''){ err.textContent='رجاءً جاوب على كل الأسئلة قبل الإرسال (السؤال '+(i+1)+').'; 
      document.querySelector('.q[data-i="'+i+'"]').scrollIntoView({behavior:'smooth',block:'center'}); return; }
  }
  // score knowledge questions
  let correct=0, total=0;
  QUESTIONS.forEach((q,i)=>{ if(q.type==='mcq'||q.type==='tf'){ total++; if(answers[i]===q.correct) correct++; } });
  // store
  const rec={ ts:new Date().toISOString(), ident:document.getElementById('ident').value||'', score:correct, total:total, answers:answers };
  try{ const all=JSON.parse(localStorage.getItem(STOREKEY)||'[]'); all.push(rec); localStorage.setItem(STOREKEY,JSON.stringify(all)); }catch(e){}
  // إرسال للشيت المركزي (إن وُجد رابط)
  if(ENDPOINT && ENDPOINT.indexOf('http')===0){
    try{ fetch(ENDPOINT, { method:'POST', mode:'no-cors', body: JSON.stringify(Object.assign({survey:SURVEY_ID}, rec)) }); }catch(e){}
  }
  // reveal correct answers (after only)
  if(REVEAL){
    QUESTIONS.forEach((q,i)=>{
      if(q.type==='mcq'||q.type==='tf'){
        const card=document.querySelector('.q[data-i="'+i+'"]');
        card.querySelectorAll('.opt').forEach(opt=>{
          const j=parseInt(opt.dataset.j);
          if(j===q.correct) opt.classList.add('correct');
          else if(j===answers[i]) opt.classList.add('wrong');
        });
      }
    });
  }
  // show result
  document.getElementById('f').style.display='none';
  const res=document.getElementById('result'); res.style.display='block';
  document.getElementById('rtitle').textContent='تمام! خلّصت 👏';
  document.getElementById('rbody').textContent='شكراً لمشاركتك ووعيك. خلك قدوة بالطريق.. ولا يسوقونها عليك.';
  if(REVEAL && total>0){
    document.getElementById('scorewrap').innerHTML='<div class="scorebadge">جاوبت صح <b>'+correct+'</b> من '+total+'</div>';
  }
  res.scrollIntoView({behavior:'smooth',block:'start'});
});

// admin CSV export
document.getElementById('exp').addEventListener('click',(e)=>{
  e.preventDefault();
  let all=[]; try{ all=JSON.parse(localStorage.getItem(STOREKEY)||'[]'); }catch(e){}
  if(!all.length){ alert('ما فيه ردود مخزّنة على هذا الجهاز بعد.'); return; }
  const cols=['ts','ident','score','total'].concat(QUESTIONS.map((q,i)=>'q'+(i+1)));
  const rows=[cols.join(',')];
  all.forEach(r=>{
    const line=[r.ts, '"'+(r.ident||'').replace(/"/g,'""')+'"', r.score, r.total]
      .concat(QUESTIONS.map((q,i)=>{ let v=r.answers[i]; if(typeof v==='string') return '"'+v.replace(/"/g,'""')+'"'; return v===undefined?'':v; }));
    rows.push(line.join(','));
  });
  const blob=new Blob(["\ufeff"+rows.join("\n")],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=STOREKEY+'.csv'; a.click();
});

// admin-only: reveal export link when URL has ?admin=1 (or #admin)
(function(){
  var p=new URLSearchParams(location.search);
  if(p.get('admin')==='1' || location.hash==='#admin'){
    var fo=document.querySelector('.footer'); if(fo) fo.style.display='block';
  }
})();
</script>
